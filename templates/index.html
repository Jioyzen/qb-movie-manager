<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QB 影视管理工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .top-bar { background: #fff; border-bottom: 1px solid #dee2e6; padding: 8px 16px; }
    .top-bar .brand { font-weight: 700; font-size: 18px; color: #212529; }
    .step-nav { background: #fff; border-bottom: 1px solid #dee2e6; padding: 0; display: flex; }
    .step-nav .step { flex: 1; text-align: center; padding: 14px 8px; cursor: pointer; font-size: 14px; color: #6c757d; border-bottom: 3px solid transparent; transition: all .2s; user-select: none; }
    .step-nav .step:hover { background: #f8f9fa; }
    .step-nav .step.active { color: #0d6efd; border-bottom-color: #0d6efd; font-weight: 600; }
    .step-nav .step .step-num { display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #e9ecef; text-align: center; font-weight: 700; font-size: 12px; margin-right: 6px; color: #495057; }
    .step-nav .step.active .step-num { background: #0d6efd; color: #fff; }
    .step-nav .step .step-label { vertical-align: middle; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 16px; }
    .card-header { background: #f8f9fa; border-bottom: 1px solid #dee2e6; font-weight: 600; padding: 12px 16px; }
    .card-body { padding: 16px; }
    .table { font-size: 13px; margin-bottom: 0; }
    .table th { background: #f8f9fa; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 1; font-weight: 600; white-space: nowrap; }
    .table td { vertical-align: middle; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 768px) { .config-grid { grid-template-columns: 1fr; } }
    .progress { height: 24px; border-radius: 12px; background: #e9ecef; }
    .progress-bar { background: #0d6efd; border-radius: 12px; font-size: 12px; line-height: 24px; }
    .log-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; padding: 12px; font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    .table-wrapper { max-height: 550px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 6px; }
    .table-wrapper table { margin-bottom: 0; }
    .edit-input { border: 1px solid #86b7fe; font-size: 12px; padding: 2px 6px; }
    .priority-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid #dee2e6; border-radius: 6px; cursor: pointer; background: #fff; font-size: 13px; transition: all .15s; user-select: none; }
    .priority-tag.active { border-color: #0d6efd; background: #f0f6ff; }
    .priority-tag:hover { border-color: #86b7fe; }
    .form-label { font-weight: 500; font-size: 13px; margin-bottom: 4px; color: #495057; }
    .badge-mat { font-weight: 500; }
    .num-count { font-size: 24px; font-weight: 700; color: #0d6efd; }
    .btn { font-weight: 500; }
    .footer { text-align: center; padding: 16px; color: #adb5bd; font-size: 12px; }
    .cell-text { white-space: normal; word-break: break-word; }
  </style>
</head>
<body>

<div class="top-bar d-flex align-items-center justify-content-between">
  <div class="brand"><i class="bi bi-film text-primary me-2"></i>QB 影视管理工具</div>
  <div>
    <span id="connectionStatus" class="status-badge bg-secondary text-white">未连接</span>
  </div>
</div>

<div class="step-nav" id="stepNav">
  <div class="step active" data-tab="config"><span class="step-num">1</span><span class="step-label">配置</span></div>
  <div class="step" data-tab="fetch"><span class="step-num">2</span><span class="step-label">获取种子</span></div>
  <div class="step" data-tab="parse"><span class="step-num">3</span><span class="step-label">解析与匹配</span></div>
  <div class="step" data-tab="duplicates"><span class="step-num">4</span><span class="step-label">去重筛选</span></div>
  <div class="step" data-tab="delete"><span class="step-num">5</span><span class="step-label">删除清理</span></div>
</div>

<div class="container-fluid px-3 py-3">

  <!-- Step 1: Config -->
  <div id="tab-config" class="tab-pane active">
    <div class="row">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header"><i class="bi bi-server me-2"></i>qBittorrent 连接</div>
          <div class="card-body">
            <div class="mb-2"><label class="form-label">地址</label><input id="cfg-qb-host" class="form-control form-control-sm" value="192.168.2.200"></div>
            <div class="mb-2"><label class="form-label">端口</label><input id="cfg-qb-port" class="form-control form-control-sm" value="8085"></div>
            <div class="mb-2"><label class="form-label">用户名</label><input id="cfg-qb-user" class="form-control form-control-sm" value="admin"></div>
            <div class="mb-2"><label class="form-label">密码</label><input id="cfg-qb-pass" type="password" class="form-control form-control-sm" value="zz0770"></div>
            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-outline-primary btn-sm" onclick="testConnection()"><i class="bi bi-plug me-1"></i>测试连接</button>
              <button class="btn btn-primary btn-sm" onclick="saveConfig()"><i class="bi bi-save me-1"></i>保存配置</button>
            </div>
            <div id="testResult" class="mt-2 small"></div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header"><i class="bi bi-film me-2"></i>TMDB 配置</div>
          <div class="card-body">
            <div class="mb-2"><label class="form-label">API Key</label><input id="cfg-tmdb-key" class="form-control form-control-sm" value="f71a029311ca7a272c05c7d217bb5c5b"></div>
            <div class="mb-2"><label class="form-label">请求间隔(秒)</label><input id="cfg-tmdb-rate" class="form-control form-control-sm" value="0.15"></div>
            <div class="mb-2"><label class="form-label">并发线程数</label><input id="cfg-tmdb-workers" class="form-control form-control-sm" value="8"></div>
            <div class="mb-2"><label class="form-label">跳过小文件(MB)</label><input id="cfg-min-size" class="form-control form-control-sm" value="300" title="解析时跳过小于此体积的视频文件（如 Sample 片段）"></div>
            <div class="small text-muted mt-2">调整过高的并发可能触发 TMDB 限流；设为 1 即串行匹配最稳定</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Fetch -->
  <div id="tab-fetch" class="tab-pane">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-cloud-download me-2"></i>获取种子</span>
        <span id="torrentCount" class="small text-muted"></span>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">选择分类</label>
          <div id="categoryCheckboxes" class="d-flex flex-wrap gap-2">
            <span class="text-muted small">请先测试连接</span>
          </div>
        </div>
        <button class="btn btn-primary mb-3" onclick="fetchTorrents()"><i class="bi bi-arrow-down-circle me-1"></i>获取种子列表</button>
        <div class="table-wrapper">
          <table class="table table-sm table-hover">
            <thead><tr><th>种子名称</th><th>分类</th><th>大小</th><th>分享率</th><th>状态</th></tr></thead>
            <tbody id="torrentTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 3: Parse & Match -->
  <div id="tab-parse" class="tab-pane">
    <div class="row">
      <div class="col-12 mb-2">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <button class="btn btn-primary" onclick="runParse()"><i class="bi bi-diagram-3 me-1"></i>步骤1: 解析文件</button>
          <div class="small text-muted ms-2" id="entryCount"></div>
        </div>
      </div>
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-table me-2"></i>解析结果</span>
            <div class="d-flex gap-2">
              <span id="matchStatus" class="small"></span>
              <button class="btn btn-sm btn-outline-secondary" onclick="editAllToggle()" id="editToggleBtn"><i class="bi bi-pencil me-1"></i>编辑</button>
              <button class="btn btn-sm btn-outline-success" onclick="saveEdited()"><i class="bi bi-check me-1"></i>保存修改</button>
            </div>
          </div>
          <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
              <button class="btn btn-success btn-sm" onclick="runMatch()" id="matchBtn"><i class="bi bi-search me-1"></i>步骤2: TMDB 匹配</button>
            </div>
            <div id="matchProgress" style="display:none" class="mb-2">
              <div class="progress"><div id="matchBar" class="progress-bar" style="width:0%">0%</div></div>
            </div>
            <div class="table-wrapper">
              <table class="table table-sm table-hover">
                <thead><tr><th>种子名</th><th style="width:130px">标题</th><th style="width:60px">年份</th><th>分辨率</th><th>来源</th><th>编码</th><th>HDR</th><th>DV</th><th>音频</th><th style="width:120px">TMDB 片名</th><th style="width:70px">TMDB ID</th></tr></thead>
                <tbody id="entryTbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 4: Duplicates -->
  <div id="tab-duplicates" class="tab-pane">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-funnel me-2"></i>重复资源</span>
        <span id="duplicateStats"></span>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-bold">优先级规则（点击切换开关）</label>
          <div class="d-flex flex-wrap gap-2">
            <span class="priority-tag active" data-rule="resolution" onclick="toggleRule(this)"><i class="bi bi-check-circle-fill text-primary"></i>4K优先</span>
            <span class="priority-tag active" data-rule="source" onclick="toggleRule(this)"><i class="bi bi-check-circle-fill text-primary"></i>BluRay优先</span>
            <span class="priority-tag active" data-rule="codec" onclick="toggleRule(this)"><i class="bi bi-check-circle-fill text-primary"></i>x265优先</span>
            <span class="priority-tag active" data-rule="hdr" onclick="toggleRule(this)"><i class="bi bi-check-circle-fill text-primary"></i>HDR优先</span>
            <span class="priority-tag active" data-rule="dovi" onclick="toggleRule(this)"><i class="bi bi-check-circle-fill text-primary"></i>杜比视界优先</span>
            <span class="priority-tag" data-rule="multi_audio" onclick="toggleRule(this)"><i class="bi bi-circle"></i>多音轨优先</span>
            <span class="priority-tag" data-rule="atmos" onclick="toggleRule(this)"><i class="bi bi-circle"></i>Atmos优先</span>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2 mb-2">
          <button class="btn btn-primary btn-sm" onclick="computeDuplicates()"><i class="bi bi-calculator me-1"></i>计算重复</button>
          <div class="form-check ms-2">
            <input type="checkbox" id="toggleAll" class="form-check-input" onchange="toggleAllDelete(this)">
            <label class="form-check-label small" for="toggleAll">全选待删</label>
          </div>
          <span class="ms-auto small">待删除: <strong id="deleteCount" class="text-danger">0</strong></span>
        </div>
        <div class="table-wrapper">
          <table class="table table-sm table-hover">
            <thead><tr><th style="width:36px"><input type="checkbox" onchange="toggleAllDelete(this)"></th><th>电影</th><th>种子名</th><th>分辨率</th><th>来源</th><th>编码</th><th>HDR</th><th>音频</th><th>大小</th><th>评分</th><th>操作</th></tr></thead>
            <tbody id="duplicateTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 5: Delete -->
  <div id="tab-delete" class="tab-pane">
    <div class="card">
      <div class="card-header"><i class="bi bi-trash me-2"></i>确认删除</div>
      <div class="card-body text-center py-4">
        <div class="mb-3">
          <span class="num-count" id="deleteFinalCount">0</span>
          <span class="text-muted ms-2">个种子将被删除（含文件）</span>
        </div>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-danger btn-lg" onclick="deleteSelected()"><i class="bi bi-trash3 me-2"></i>确认删除</button>
          <button class="btn btn-outline-secondary btn-lg" onclick="switchTab('duplicates')"><i class="bi bi-arrow-left me-1"></i>返回检查</button>
        </div>
        <div id="deleteResult" class="mt-3"></div>
      </div>
    </div>
  </div>

</div>

<div class="footer">QB Movie Manager v1.0</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
